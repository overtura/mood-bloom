name: Mood Bloom
repository: overtura/mood-bloom
kind: browser-local-frontend
status: initial-product
license: MIT
default_branch: main
package_manager: pnpm
runtime:
  framework: React
  bundler: Vite
  language: TypeScript
  renderer: Three.js
privacy:
  backend: false
  external_inference_api: false
  persistence: versioned-local-storage
model:
  id: Xenova/paraphrase-multilingual-MiniLM-L12-v2
  execution: web-worker
  preferred_device: webgpu
  fallback_device: wasm
renderer_version: "1"
growth_days: [1, 3, 7, 14, 30]
verification:
  - pnpm check
  - pnpm test:e2e
